<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midwest Emo</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0c0d0f;
  --paper:  #e8e0d0;
  --sepia:  #b89a6a;
  --warm:   #d4b896;
  --dim:    #5a5040;
  --cold:   #8fa0b0;
  --ink:    #1a1612;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--paper);
  font-family: 'IBM Plex Mono', monospace;
  overflow: hidden;
}

/* ── NOISE ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 100;
}

/* ── SCENE ── */
.scene {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Sky gradient — winter dusk */
.sky {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    #0a0c12 0%,
    #121828 25%,
    #1e2535 50%,
    #2a2e38 70%,
    #1a1612 100%
  );
}

/* Ground / snow */
.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 22%;
  background: linear-gradient(180deg, #1e2028 0%, #252830 40%, #2e3038 100%);
}
.ground::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, #c8cdd8 30%, #d8dde8 60%, transparent 100%);
  opacity: 0.5;
}

/* Stars */
.stars {
  position: absolute; inset: 0;
}
.star {
  position: absolute;
  width: 1px; height: 1px;
  background: #c8cdd8;
  border-radius: 50%;
}

/* ── THE HOUSE SVG ── */
.house-wrap {
  position: relative;
  z-index: 10;
  margin-bottom: -8vh;
}

.house-svg {
  width: min(500px, 82vw);
  filter: drop-shadow(0 8px 40px rgba(0,0,0,0.7));
}

/* Window glow */
@keyframes flicker {
  0%,100% { opacity: 0.55; }
  50%      { opacity: 0.45; }
  75%      { opacity: 0.60; }
}
.window-glow { animation: flicker 4s ease-in-out infinite; }
.window-glow-2 { animation: flicker 5.5s ease-in-out infinite 1s; }

/* ── TEXT LAYER ── */
.address-wrap {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: 3vh;
}

.address {
  font-family: 'IBM Plex Mono', monospace;
  font-size: clamp(9px, 1.1vw, 13px);
  font-weight: 300;
  color: var(--cold);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeUp 1.8s ease 0.8s forwards;
}

.tagline {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(14px, 2vw, 20px);
  color: var(--warm);
  opacity: 0;
  margin-top: 10px;
  animation: fadeUp 1.8s ease 1.4s forwards;
}

.enter-btn {
  display: inline-block;
  margin-top: 24px;
  padding: 10px 28px;
  border: 1px solid rgba(180,160,120,0.3);
  border-radius: 2px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sepia);
  background: transparent;
  cursor: pointer;
  opacity: 0;
  animation: fadeUp 1.8s ease 2.2s forwards;
  transition: border-color 0.3s, color 0.3s, background 0.3s;
  text-decoration: none;
}
.enter-btn:hover {
  border-color: rgba(180,160,120,0.7);
  color: var(--paper);
  background: rgba(180,160,120,0.05);
}

/* Snow particles */
.snow { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 5; }
.flake {
  position: absolute;
  top: -10px;
  color: rgba(210,220,230,0.5);
  font-size: 8px;
  animation: fall linear infinite;
  user-select: none;
}
@keyframes fall {
  to { transform: translateY(110vh) translateX(30px); opacity: 0; }
}

/* ── COMING SOON OVERLAY ── */
.rooms-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 20;
  opacity: 0;
  animation: fadeUp 1.5s ease 3.2s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="scene">
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="snow" id="snow"></div>

  <!-- ── THE HOUSE ── -->

    <!--

        <filter id="glow-warm">
          <feGaussianBlur stdDeviation="3" result="blur"/>

      <!-- ── LEFT TREE (large mature deciduous, bare) ── -->

const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {

  s.className = 'star';
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*55}%;
    opacity:${Math.random()*0.6+0.1};
    width:${Math.random()<0.15?2:1}px;
    height:${Math.random()<0.15?2:1}px;
  `;
  starsEl.appendChild(s);
}

// Snow
const snowEl = document.getElementById('snow');
for (let i = 0; i < 40; i++) {
  const f = document.createElement('div');
  f.className = 'flake';
  f.textContent = '·';
  f.style.cssText = `
    left:${Math.random()*100}%;
    font-size:${Math.random()*6+4}px;
    animation-duration:${Math.random()*8+6}s;
    animation-delay:${Math.random()*8}s;
    opacity:${Math.random()*0.4+0.1};
  `;
  snowEl.appendChild(f);
}
